<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Evalify</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#4F46E5',
            secondary: '#E0E6FC',
          },
          fontFamily: {
            sans: ['Poppins', 'Inter', 'sans-serif'],
          },
          animation: {
            blob: "blob 7s infinite",
          },
          keyframes: {
            blob: {
              "0%": { transform: "translate(0px, 0px) scale(1)" },
              "33%": { transform: "translate(30px, -50px) scale(1.1)" },
              "66%": { transform: "translate(-20px, 20px) scale(0.9)" },
              "100%": { transform: "translate(0px, 0px) scale(1)" },
            },
          },
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer base {
          body {
            @apply font-sans text-gray-800 antialiased bg-gray-50;
          }
        }
        @layer components {
          .btn-primary {
            @apply bg-primary text-white px-6 py-2 rounded-full font-medium transition-all duration-300 hover:bg-opacity-90 hover:shadow-lg transform hover:-translate-y-0.5;
          }
          .btn-outline {
            @apply border-2 border-primary text-primary px-6 py-2 rounded-full font-medium transition-all duration-300 hover:bg-primary hover:text-white hover:shadow-lg transform hover:-translate-y-0.5;
          }
          .nav-link {
            @apply text-gray-700 font-medium hover:text-primary transition-colors duration-300;
          }
          .input-field {
            @apply w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all duration-300 bg-white;
          }
        }
        .animation-delay-2000 {
          animation-delay: 2s;
        }
        .animation-delay-4000 {
          animation-delay: 4s;
        }
      </style>
</head>

<body class="bg-gray-50 flex flex-col min-h-screen">
  <!-- Navbar -->
  <nav class="w-full bg-white shadow-sm z-50 transition-all duration-300" id="navbar">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-20">
        <!-- Logo -->
        <div class="flex-shrink-0 flex items-center cursor-pointer" onclick="window.location.href='/'">
          <img src="/cb8b81f3f695ccaa88a2a199a16d5e49e712edf3(1)(1).png" alt="Evalify Logo"
            class="w-25 h-8 object-contain mr-2">
        </div>

        <!-- Menu Items (Desktop) -->
        <div class="hidden md:flex space-x-8">
          <a href="/" class="nav-link">Home</a>
          <a href="/#about" class="nav-link">About Us</a>
          <a href="/#contact" class="nav-link">Contact Us</a>
        </div>

        <!-- Buttons (Desktop) -->
        <div class="hidden md:flex space-x-4 items-center">
          <!-- <button class="btn-primary" onclick="window.location.href='/login/'">Log In</button> -->
          <button class="btn-outline" onclick="window.location.href='/register/'">Register Now</button>
        </div>

        <!-- Mobile menu button -->
        <div class="md:hidden flex items-center">
          <button id="mobile-menu-btn" class="text-gray-500 hover:text-primary focus:outline-none">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Mobile Menu Panel -->
    <div id="mobile-menu"
      class="hidden md:hidden bg-white border-t border-gray-100 px-4 pt-2 pb-6 space-y-4 shadow-lg absolute w-full">
      <a href="/" class="block nav-link py-2">Home</a>
      <a href="/#about" class="block nav-link py-2">About Us</a>
      <a href="/#contact" class="block nav-link py-2">Contact Us</a>
      <div class="flex flex-col space-y-3 pt-4 border-t border-gray-100">
        <!-- <button class="btn-primary w-full text-center" onclick="window.location.href='/login/'">Log In</button> -->
        <button class="btn-outline w-full text-center" onclick="window.location.href='/register/'">Register Now</button>
      </div>
    </div>
  </nav>

  <!-- Login Section -->
  <main class="flex-grow flex items-center justify-center py-12 relative overflow-hidden">
    <!-- Background blobs -->
    <div class="absolute top-0 right-0 w-96 h-96 bg-purple-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 translate-x-1/3 -translate-y-1/3 animate-blob"></div>
    <div class="absolute bottom-0 left-0 w-96 h-96 bg-secondary rounded-full mix-blend-multiply filter blur-3xl opacity-30 -translate-x-1/3 translate-y-1/3 animate-blob animation-delay-2000"></div>

    <div class="max-w-6xl mx-auto px-4 w-full relative z-10">
      <div class="bg-white rounded-3xl shadow-xl overflow-hidden flex flex-col md:flex-row border border-gray-100">
        
        <!-- Left Side: Login Form -->
        <div class="w-full md:w-1/2 p-8 md:p-12 lg:p-16 flex flex-col justify-center">
          <div class="max-w-md mx-auto w-full">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-900 mb-2">Welcome to Evalify</h1>
            <p class="text-gray-500 mb-8 leading-relaxed">
              With Evalify dashboard you can improve evaluation process for handwritten answers.
            </p>

            <form id="login-form" class="space-y-6">
              <!-- Email Field -->
              <div class="relative">
                <label for="email" class="sr-only">Email</label>
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                  <i class="fas fa-envelope text-gray-400"></i>
                </div>
                <input type="email" id="email" name="email" required
                  class="input-field" placeholder="Email Address">
              </div>

              <!-- Password Field -->
              <div class="relative">
                <label for="password" class="sr-only">Password</label>
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                  <i class="fas fa-lock text-gray-400"></i>
                </div>
                <input type="password" id="password" name="password" required
                  class="input-field pr-12" placeholder="Password">
                <button type="button" id="toggle-password" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-primary focus:outline-none transition-colors">
                  <i class="fas fa-eye" id="eye-icon"></i>
                </button>
              </div>
              
              <!-- Helper Text -->
              <p class="text-xs text-gray-500 ml-1">must be at least 8 characters</p>

              <!-- Remember me & Forgot Password -->
              <div class="flex items-center justify-between mt-2">
                 <div class="flex items-center">
                   <input type="checkbox" id="remember" class="w-4 h-4 text-primary bg-gray-100 border-gray-300 rounded focus:ring-primary focus:ring-2">
                   <label for="remember" class="ml-2 text-sm font-medium text-gray-700">Remember me</label>
                 </div>
                 <a href="/forgot-password/" class="text-sm font-medium text-primary hover:underline">forget your password?</a>
              </div>

              <!-- Login Button -->
              <button id="submit-btn" type="submit" class="w-full bg-primary text-white py-3 rounded-xl font-semibold shadow-lg hover:bg-opacity-90 transition-all duration-300 transform hover:-translate-y-0.5 hover:shadow-xl mt-6 disabled:opacity-75 disabled:cursor-not-allowed">
                Log In
              </button>

              <!-- Feedback Message -->
              <div id="feedback-message" class="hidden text-center text-sm font-medium p-3 rounded-lg mt-4 transition-all duration-300"></div>
            </form>

            <p class="text-center mt-8 text-gray-600">
              Don't have account? <a href="/register/" class="text-primary font-semibold hover:underline">Register Now</a>
            </p>
          </div>
        </div>

        <!-- Right Side: 3D Illustration -->
        <div class="w-full md:w-1/2 bg-gradient-to-br from-purple-50 to-secondary p-8 flex items-center justify-center relative overflow-hidden hidden md:flex">
           <!-- Dynamic decorative rings -->
           <div class="absolute w-[120%] h-[120%] border-[40px] border-white/40 rounded-full animate-[spin_30s_linear_infinite]"></div>
           <div class="absolute inset-0 bg-primary/5 backdrop-blur-[2px]"></div>
           <img src="../42f6c0980edf150b38ac6f2380dbd43649090a4b.png" alt="3D AI Robot Illustration" class="relative z-10 w-full max-w-md object-contain drop-shadow-2xl hover:scale-105 transition-transform duration-700 ease-in-out">
        </div>

      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-50 py-8 border-t border-gray-200 mt-auto">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex flex-col md:flex-row justify-between items-center gap-6">
        <!-- Logo -->
        <div class="flex items-center cursor-pointer" onclick="window.location.href='/'">
          <img src="/cb8b81f3f695ccaa88a2a199a16d5e49e712edf3(1)(1).png" alt="Evalify Logo"
            class="w-25 h-8 object-contain mr-2 filter drop-shadow-sm">
        </div>

        <!-- Copyright -->
        <div class="text-gray-500 text-sm font-medium">
          Copyright &copy; 2026 All rights reserved
        </div>

        <!-- Socials -->
        <div class="flex space-x-4">
          <a href="#"
            class="w-10 h-10 rounded-full bg-white border border-gray-200 flex items-center justify-center text-gray-500 hover:bg-primary hover:text-white transition-all duration-300 hover:shadow-md transform hover:-translate-y-1">
            <i class="fab fa-facebook-f"></i>
          </a>
          <a href="#"
            class="w-10 h-10 rounded-full bg-white border border-gray-200 flex items-center justify-center text-gray-500 hover:bg-primary hover:text-white transition-all duration-300 hover:shadow-md transform hover:-translate-y-1">
            <i class="fab fa-google"></i>
          </a>
          <a href="#"
            class="w-10 h-10 rounded-full bg-white border border-gray-200 flex items-center justify-center text-gray-500 hover:bg-primary hover:text-white transition-all duration-300 hover:shadow-md transform hover:-translate-y-1">
            <i class="fab fa-whatsapp"></i>
          </a>
        </div>
      </div>
    </div>
  </footer>

  <script type="module">
    // import '/src/main.js';

    document.addEventListener('DOMContentLoaded', () => {
      // Mobile menu toggle logic
      const mobileMenuBtn = document.getElementById('mobile-menu-btn');
      const mobileMenu = document.getElementById('mobile-menu');
      if (mobileMenuBtn && mobileMenu) {
        mobileMenuBtn.addEventListener('click', () => {
          mobileMenu.classList.toggle('hidden');
        });
      }

      // Password toggle script
      const togglePassword = document.getElementById('toggle-password');
      const passwordField = document.getElementById('password');
      const eyeIcon = document.getElementById('eye-icon');

      if(togglePassword) {
        togglePassword.addEventListener('click', function (e) {
            const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordField.setAttribute('type', type);
            if (type === 'password') {
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            } else {
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            }
        });
      }

      // Login form submission mock
      const loginForm = document.getElementById('login-form');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const submitBtn = document.getElementById('submit-btn');
      const feedbackMessage = document.getElementById('feedback-message');
      const rememberCheckbox = document.getElementById('remember');

      // Check LocalStorage for remembered email
      const savedEmail = localStorage.getItem('rememberedEmail');
      if (savedEmail && emailInput && rememberCheckbox) {
          emailInput.value = savedEmail;
          rememberCheckbox.checked = true;
      }

      if(loginForm) {
        loginForm.addEventListener('submit', async (e) => {
          e.preventDefault();

          // Capture values
          const email = emailInput.value;
          const password = passwordInput.value;

          // Client-side Password Validation
          if (password.length < 8) {
            feedbackMessage.innerHTML = 'Password must be at least 8 characters long.';
            feedbackMessage.className = 'text-center text-sm font-medium p-3 rounded-lg mt-4 transition-all duration-300 bg-red-100 text-red-700';
            return;
          }

          // Set Loading State
          submitBtn.disabled = true;
          submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Processing...';
          feedbackMessage.classList.add('hidden');
          feedbackMessage.className = 'hidden text-center text-sm font-medium p-3 rounded-lg mt-4 transition-all duration-300'; // reset classes

          try {
            // Placeholder for real API call (axios/fetch)
            // Example: await axios.post('/api/login', { email, password });
            await mockLogin(email, password);

            // Handle User Session Data
            localStorage.setItem('userName', 'Dr. Sarah'); // Mock user name

            // Handle Remember Me
            if (rememberCheckbox && rememberCheckbox.checked) {
                localStorage.setItem('rememberedEmail', email);
            } else {
                localStorage.removeItem('rememberedEmail');
            }
            
            // Redirect after brief delay
            setTimeout(() => {
              window.location.href = '/dashboard/';
            }, 1000);

          } catch (error) {
            // Error feedback
            feedbackMessage.innerHTML = error.message || 'Invalid email or password. Please try again.';
            feedbackMessage.classList.remove('hidden');
            feedbackMessage.classList.add('bg-red-100', 'text-red-700');
            
            // Reset button state
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'Log In';
          }
        });
      }

      // Mock login function simulating API call
      function mockLogin(email, password) {
        return new Promise((resolve, reject) => {
          setTimeout(() => {
            // Mock database of registered users
            const mockDatabase = ['test@example.com', 'admin@evalify.com'];
            
            if (!mockDatabase.includes(email)) {
                reject(new Error('Account not found. Please <a href="/register/" class="underline font-semibold hover:text-red-800">register first</a>.'));
            } else if (email && password) {
                // Simulate real-world response. We'll pretend success here.
                resolve({ status: 'success', token: 'mock-jwt-token-123' });
            } else {
                reject(new Error('Email and password are required.'));
            }
          }, 1500); // 1.5 seconds delay for UX
        });
      }
    });
  </script>
</body>
</html>
