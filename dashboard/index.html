<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher Dashboard - Evalify</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#4F46E5',
            secondary: '#E0E6FC',
          },
          fontFamily: {
            sans: ['Poppins', 'Inter', 'sans-serif'],
          },
          animation: {
            blob: "blob 7s infinite",
          },
          keyframes: {
            blob: {
              "0%": { transform: "translate(0px, 0px) scale(1)" },
              "33%": { transform: "translate(30px, -50px) scale(1.1)" },
              "66%": { transform: "translate(-20px, 20px) scale(0.9)" },
              "100%": { transform: "translate(0px, 0px) scale(1)" },
            },
          },
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer base {
      body {
        @apply font-sans bg-gray-50 text-gray-800 antialiased;
      }
    }
    @layer components {
      .sidebar-link {
        @apply flex items-center px-6 py-3 text-gray-600 hover:bg-indigo-50 hover:text-primary transition-colors duration-200 border-l-4 border-transparent;
      }
      .sidebar-link.active {
        @apply bg-indigo-50 text-primary border-primary font-medium;
      }
      .stat-card {
        @apply bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-between transition-all duration-300 hover:shadow-md hover:-translate-y-1;
      }
      .btn-primary {
         @apply bg-primary text-white px-6 py-2.5 rounded-xl font-medium shadow-sm hover:shadow-md hover:bg-opacity-90 transition-all duration-300 transform hover:-translate-y-0.5 inline-flex items-center;
      }
       .btn-outline {
         @apply border border-gray-300 bg-white text-gray-700 px-6 py-2.5 rounded-xl font-medium shadow-sm hover:shadow-md hover:bg-gray-50 transition-all duration-300 transform hover:-translate-y-0.5 inline-flex items-center;
      }
      .table-header {
        @apply px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider bg-gray-50/50 backdrop-blur-sm sticky top-0 border-b border-gray-100;
      }
      .table-cell {
        @apply px-6 py-4 whitespace-nowrap text-sm text-gray-700 border-b border-gray-50/50;
      }
    }
  </style>
</head>

<body class="bg-gray-50 flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <aside class="w-64 bg-white border-r border-gray-200 flex flex-col h-full flex-shrink-0 relative z-20">
    <div class="h-20 flex items-center px-6 border-b border-gray-100 cursor-pointer" onclick="window.location.href='/'">
      <img src="/cb8b81f3f695ccaa88a2a199a16d5e49e712edf3(1)(1).png" alt="Evalify Logo" class="w-24 h-8 object-contain">
    </div>
    
    <nav class="flex-1 overflow-y-auto py-4 space-y-1">
      <a href="/dashboard/" class="sidebar-link active">
        <i class="fas fa-home w-6 text-center mr-2"></i> Dashboard
      </a>
      <a href="#" class="sidebar-link">
        <i class="fas fa-file-upload w-6 text-center mr-2"></i> Upload Template
      </a>
      <a href="#upload-answers" class="sidebar-link" id="nav-upload-answers">
        <i class="fas fa-copy w-6 text-center mr-2"></i> Upload Answers
      </a>
      <a href="#start-evaluation" class="sidebar-link" id="nav-start-evaluation">
        <i class="fas fa-robot w-6 text-center mr-2"></i> Start Evaluation
      </a>
      <a href="#" class="sidebar-link">
        <i class="fas fa-users w-6 text-center mr-2"></i> Students Lists
      </a>
    </nav>
    
    <div class="p-4 border-t border-gray-100">
      <a href="#" class="sidebar-link rounded-lg hover:bg-gray-50 border-none">
        <i class="fas fa-headset w-6 text-center mr-2"></i> Support
      </a>
      <div class="mt-4 flex items-center px-6 py-2">
         <img src="https://ui-avatars.com/api/?name=User&background=4F46E5&color=fff" alt="User Avatar" class="w-10 h-10 rounded-full border-2 border-white shadow-sm mr-3 user-avatar">
         <div>
            <p class="text-sm font-semibold text-gray-800 user-name-display">Loading...</p>
            <p class="text-xs text-gray-500">Instructor</p>
         </div>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col h-full overflow-hidden relative">
    
    <!-- Top Navbar -->
    <header class="h-20 bg-white/80 backdrop-blur-md border-b border-gray-200 flex items-center justify-between px-8 z-10">
      <h1 class="text-2xl font-bold text-gray-800" id="welcome-message">Welcome back, <span class="text-primary animate-pulse inline-block w-24 h-6 bg-gray-200 rounded"></span> 👋</h1>
      
      <div class="flex items-center space-x-4">
        <button class="w-10 h-10 rounded-full bg-gray-50 hover:bg-gray-100 text-gray-600 flex items-center justify-center transition-colors relative">
          <i class="far fa-bell"></i>
          <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full"></span>
        </button>
        <div class="h-8 w-px bg-gray-200"></div>
        <div class="flex items-center cursor-pointer hover:bg-gray-50 rounded-full py-1 pr-4 pl-1 transition-colors">
          <img src="https://ui-avatars.com/api/?name=User&background=4F46E5&color=fff" alt="Avatar" class="w-8 h-8 rounded-full user-avatar mr-2">
          <span class="text-sm font-medium text-gray-700 user-name-display">Loading...</span>
          <i class="fas fa-chevron-down text-xs text-gray-400 ml-2"></i>
        </div>
      </div>
    </header>

    <!-- Scrollable Content Area -->
    <div class="flex-1 overflow-y-auto p-8 relative">
       <!-- Background elements -->
       <div class="absolute top-0 right-0 w-96 h-96 bg-purple-100 rounded-full mix-blend-multiply filter blur-3xl opacity-30 translate-x-1/3 -translate-y-1/3 animate-blob pointer-events-none"></div>

      <!-- Action Buttons -->
      <div class="flex justify-between items-center mb-8">
        <h2 class="text-lg font-semibold text-gray-700">Quick Actions</h2>
        <div class="flex space-x-4">
          <button class="btn-outline group" onclick="document.getElementById('nav-upload-answers').scrollIntoView({behavior: 'smooth'})">
            <i class="fas fa-cloud-upload-alt mr-2 text-gray-400 group-hover:text-gray-600 transition-colors"></i> Upload Student Answers
          </button>
          <button class="btn-primary group shadow-indigo-200/50" onclick="document.getElementById('nav-start-evaluation').scrollIntoView({behavior: 'smooth'})">
             Start AI Evaluation <i class="fas fa-magic ml-2 group-hover:rotate-12 transition-transform"></i>
          </button>
        </div>
      </div>

      <!-- Stats Grid -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
        <div class="stat-card">
          <div class="flex justify-between items-start mb-4">
            <div class="w-12 h-12 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center text-xl">
              <i class="fas fa-file-alt"></i>
            </div>
            <span class="text-sm font-medium text-green-500 bg-green-50 px-2 py-1 rounded-full">+12%</span>
          </div>
          <div>
            <h3 class="text-gray-500 text-sm font-medium mb-1">Total Exams</h3>
            <p class="text-3xl font-bold text-gray-900 counter" data-target="25">0</p>
          </div>
        </div>

        <div class="stat-card">
          <div class="flex justify-between items-start mb-4">
            <div class="w-12 h-12 rounded-full bg-indigo-50 text-indigo-600 flex items-center justify-center text-xl">
              <i class="fas fa-user-graduate"></i>
            </div>
             <span class="text-sm font-medium text-green-500 bg-green-50 px-2 py-1 rounded-full">+5%</span>
          </div>
          <div>
            <h3 class="text-gray-500 text-sm font-medium mb-1">Total Students</h3>
            <p class="text-3xl font-bold text-gray-900 counter" data-target="250">0</p>
          </div>
        </div>

        <div class="stat-card">
          <div class="flex justify-between items-start mb-4">
            <div class="w-12 h-12 rounded-full bg-green-50 text-green-600 flex items-center justify-center text-xl">
              <i class="fas fa-check-circle"></i>
            </div>
          </div>
          <div>
            <h3 class="text-gray-500 text-sm font-medium mb-1">Evaluation Done</h3>
            <p class="text-3xl font-bold text-gray-900 counter" data-target="126">0</p>
          </div>
        </div>

        <div class="stat-card border-orange-100">
          <div class="flex justify-between items-start mb-4">
            <div class="w-12 h-12 rounded-full bg-orange-50 text-orange-600 flex items-center justify-center text-xl">
              <i class="fas fa-clock"></i>
            </div>
          </div>
          <div>
            <h3 class="text-gray-500 text-sm font-medium mb-1">Pending Review</h3>
            <p class="text-3xl font-bold text-gray-900 counter" data-target="5">0</p>
          </div>
        </div>
      </div>

      <!-- Recent Students Table -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden relative z-10">
        <div class="px-6 py-5 border-b border-gray-100 flex justify-between items-center bg-white/50 backdrop-blur-sm">
          <h3 class="text-lg font-semibold text-gray-800">Recent Evaluations</h3>
          <button class="text-sm text-primary font-medium hover:underline">View All</button>
        </div>
        
        <div class="overflow-x-auto">
          <table class="w-full">
            <thead>
              <tr>
                <th class="table-header">Student Name</th>
                <th class="table-header">Exam</th>
                <th class="table-header">Score</th>
                <th class="table-header">Status</th>
              </tr>
            </thead>
            <tbody id="students-table-body">
               <!-- Skeleton Loaders initially -->
               <tr class="animate-pulse">
                  <td class="table-cell"><div class="h-4 bg-gray-200 rounded w-3/4"></div></td>
                  <td class="table-cell"><div class="h-4 bg-gray-200 rounded w-1/2"></div></td>
                  <td class="table-cell"><div class="h-4 bg-gray-200 rounded w-1/4"></div></td>
                  <td class="table-cell"><div class="h-6 bg-gray-200 rounded-full w-20"></div></td>
               </tr>
               <tr class="animate-pulse">
                  <td class="table-cell"><div class="h-4 bg-gray-200 rounded w-2/3"></div></td>
                  <td class="table-cell"><div class="h-4 bg-gray-200 rounded w-5/6"></div></td>
                  <td class="table-cell"><div class="h-4 bg-gray-200 rounded w-1/3"></div></td>
                  <td class="table-cell"><div class="h-6 bg-gray-200 rounded-full w-24"></div></td>
               </tr>
               <tr class="animate-pulse">
                  <td class="table-cell"><div class="h-4 bg-gray-200 rounded w-3/5"></div></td>
                  <td class="table-cell"><div class="h-4 bg-gray-200 rounded w-1/2"></div></td>
                  <td class="table-cell"><div class="h-4 bg-gray-200 rounded w-1/4"></div></td>
                  <td class="table-cell"><div class="h-6 bg-gray-200 rounded-full w-20"></div></td>
               </tr>
            </tbody>
          </table>
        </div>
      </div>
      
      <!-- Adding visual whitespace for scrolling targets -->
      <div id="upload-answers" class="h-20"></div>
      <div id="start-evaluation" class="h-20"></div>

    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 1. & 2. Handle User Profile & Welcome Message
      const userName = localStorage.getItem('userName') || 'Instructor';
      
      // Update welcome message
      const welcomeMessage = document.getElementById('welcome-message');
      welcomeMessage.innerHTML = `Welcome back, <span class="bg-clip-text text-transparent bg-gradient-to-r from-primary to-purple-600">${userName}</span> 👋`;
      
      // Update names in profile areas
      const nameDisplays = document.querySelectorAll('.user-name-display');
      nameDisplays.forEach(el => el.textContent = userName);
      
      // Update avatars
      const avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(userName)}&background=4F46E5&color=fff&bold=true`;
      const avatars = document.querySelectorAll('.user-avatar');
      avatars.forEach(img => img.src = avatarUrl);

      // 3. Animated Stats Cards (Count-Up)
      const counters = document.querySelectorAll('.counter');
      const speed = 200; // The lower the slower
      
      // Use Intersection Observer to start counting only when visible
      const observer = new IntersectionObserver((entries) => {
         entries.forEach(entry => {
            if (entry.isIntersecting) {
               const counter = entry.target;
               const target = +counter.getAttribute('data-target');
               
               // Give each card a slightly different duration for a natural feel
               const durationMultiplier = Math.random() * 0.5 + 0.8; // between 0.8 and 1.3
               const updateCount = () => {
                  const target = +counter.getAttribute('data-target');
                  const count = +counter.innerText;
                  // Increase based on target scale and multiplier
                  const inc = target / (speed * durationMultiplier);

                  if (count < target) {
                     counter.innerText = Math.ceil(count + inc);
                     setTimeout(updateCount, 15);
                  } else {
                     counter.innerText = target;
                  }
               };
               updateCount();
               observer.unobserve(counter); // Only run once
            }
         });
      }, { threshold: 0.5 });
      
      counters.forEach(counter => observer.observe(counter));

      // 5. Populate Table with Mock Data
      const mockStudents = [
        { name: "Ahmed Youssef", exam: "Physics Midterm", score: "92/100", status: "Evaluated", statusColor: "text-green-700 bg-green-100" },
        { name: "Salma Mahmoud", exam: "Physics Midterm", score: "88/100", status: "Evaluated", statusColor: "text-green-700 bg-green-100" },
        { name: "Omar Tarek", exam: "Chemistry Quiz 2", score: "-", status: "Pending", statusColor: "text-orange-700 bg-orange-100" },
        { name: "Nour Hisham", exam: "Chemistry Quiz 2", score: "-", status: "Pending", statusColor: "text-orange-700 bg-orange-100" },
        { name: "Karim Hassan", exam: "Math Final", score: "95/100", status: "Evaluated", statusColor: "text-green-700 bg-green-100" }
      ];

      setTimeout(() => {
        const tbody = document.getElementById('students-table-body');
        tbody.innerHTML = ''; // Clear skeletons
        
        mockStudents.forEach(student => {
          const tr = document.createElement('tr');
          tr.className = 'hover:bg-gray-50/50 transition-colors';
          tr.innerHTML = `
            <td class="table-cell font-medium text-gray-900">${student.name}</td>
            <td class="table-cell">${student.exam}</td>
            <td class="table-cell font-semibold">${student.score}</td>
            <td class="table-cell">
              <span class="px-3 py-1 inline-flex text-xs leading-5 font-semibold rounded-full ${student.statusColor}">
                ${student.status}
              </span>
            </td>
          `;
          tbody.appendChild(tr);
        });
      }, 800); // Simulate network delay for effect
    });
  </script>
</body>

</html>
