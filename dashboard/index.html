<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher Dashboard - Evalify</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#6C4DFF',
            secondary: '#E0E6FC',
            lightbg: '#F8F7FF',
            cardbg: '#DFDAFE',
            textdark: '#111827',
          },
          fontFamily: {
            sans: ['Poppins', 'Inter', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer base {
      body {
        @apply font-sans bg-[#F4F4F9] text-gray-800 antialiased overflow-hidden flex flex-col h-screen;
      }
    }
    .sidebar-item {
      @apply flex items-center px-6 py-4 text-gray-700 font-medium hover:bg-lightbg hover:text-primary transition-colors cursor-pointer;
    }
    .sidebar-item.active {
      @apply bg-lightbg text-primary border-l-4 border-primary;
    }
    .stat-card {
      @apply bg-cardbg rounded-xl p-4 flex flex-col justify-center relative overflow-hidden transition-transform hover:-translate-y-1;
    }
  </style>
</head>

<body>
  <!-- Top Navbar -->
  <header class="h-20 flex-shrink-0 bg-white border-b-2 border-secondary flex items-center justify-between px-8 relative z-20 shadow-sm">
    <div class="flex items-center cursor-pointer" onclick="window.location.href='/'">
      <img src="/cb8b81f3f695ccaa88a2a199a16d5e49e712edf3(1)(1).png" alt="Evalify Logo" class="h-8 object-contain">
    </div>
    
    <div class="hidden md:flex space-x-12 font-bold text-textdark text-base">
      <a href="/" class="hover:text-primary transition-colors">Home</a>
      <a href="/#about" class="hover:text-primary transition-colors">About Us</a>
      <a href="/#contact" class="hover:text-primary transition-colors">Contact Us</a>
    </div>

    <div class="flex items-center space-x-4">
      <i class="fas fa-bell text-primary text-xl cursor-pointer hover:text-indigo-700 transition-colors"></i>
      <span class="font-bold text-gray-500 uppercase text-xs tracking-wider user-name-display mt-0.5">DR.Mohamed</span>
      <img src="https://ui-avatars.com/api/?name=Dr+Mohamed&background=6C4DFF&color=fff" alt="User Avatar" class="w-10 h-10 rounded-full user-avatar border border-gray-200">
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden bg-white mt-4 mx-4 rounded-xl shadow-sm border border-gray-100">
    <!-- Sidebar -->
    <aside class="w-64 flex-shrink-0 bg-white border-r border-secondary flex flex-col py-6 overflow-y-auto">
      <nav class="flex-1 space-y-2">
         <div class="sidebar-item active rounded-r-full mr-4">
          <div class="w-8 flex justify-center"><i class="fas fa-house"></i></div> <span class="ml-2 font-bold">Dashboard</span>
        </div>
        <div class="sidebar-item rounded-r-full mr-4 text-primary opacity-80 hover:opacity-100 font-semibold">
          <div class="w-8 flex justify-center"><i class="fas fa-certificate"></i></div> <span class="ml-2">Upload Template</span>
        </div>
        <div class="sidebar-item rounded-r-full mr-4 text-primary opacity-80 hover:opacity-100 font-semibold">
          <div class="w-8 flex justify-center"><i class="fas fa-sun"></i></div> <span class="ml-2">Upload Answers</span>
        </div>
        <div class="sidebar-item rounded-r-full mr-4 text-primary opacity-80 hover:opacity-100 font-semibold">
          <div class="w-8 flex justify-center"><i class="fas fa-play-circle"></i></div> <span class="ml-2">Start Evaluation</span>
        </div>
        <div class="sidebar-item rounded-r-full mr-4 text-primary opacity-80 hover:opacity-100 font-semibold">
          <div class="w-8 flex justify-center"><i class="fas fa-list-ul"></i></div> <span class="ml-2">Students Lists</span>
        </div>
        <div class="mt-8 sidebar-item rounded-r-full mr-4 text-primary opacity-80 hover:opacity-100 font-semibold">
          <div class="w-8 flex justify-center"><i class="fas fa-question-circle"></i></div> <span class="ml-2">Support</span>
        </div>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto flex flex-col">
      <div class="flex-1 p-8">
        <!-- Welcome Message -->
        <h1 class="text-3xl md:text-4xl font-extrabold text-black mb-10 tracking-tight" id="welcome-message">
          Welcome back, <span class="user-name-display-title">Dr.mohamed</span> <span class="inline-block animate-bounce text-primary">👋</span>
        </h1>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
          <div class="stat-card">
            <div class="flex flex-col items-center justify-center p-2">
              <p class="text-sm font-semibold text-gray-800 mb-2">Total Exams</p>
              <div class="flex items-center space-x-3 w-full justify-center">
                 <div class="text-white bg-white/40 p-2 rounded-full"><i class="fas fa-file-invoice text-primary"></i></div>
                 <p class="text-3xl font-black text-black counter" data-target="25">0</p>
              </div>
            </div>
          </div>
          
          <div class="stat-card">
            <div class="flex flex-col items-center justify-center p-2">
              <p class="text-sm font-semibold text-gray-800 mb-2">Total Students</p>
              <div class="flex items-center space-x-3 w-full justify-center">
                 <div class="text-white bg-white/40 p-2 rounded-full"><i class="fas fa-user text-primary"></i></div>
                 <p class="text-3xl font-black text-black counter" data-target="250">0</p>
              </div>
            </div>
          </div>

          <div class="stat-card">
            <div class="flex flex-col items-center justify-center p-2">
              <p class="text-sm font-semibold text-gray-800 mb-2">Evaluation Done</p>
              <div class="flex items-center space-x-3 w-full justify-center">
                 <div class="text-white bg-white/40 p-2 rounded-full"><i class="fas fa-list-check text-primary"></i></div>
                 <p class="text-3xl font-black text-black counter" data-target="126">0</p>
              </div>
            </div>
          </div>

          <div class="stat-card">
            <div class="flex flex-col items-center justify-center p-2">
              <p class="text-sm font-semibold text-gray-800 mb-2">Pending Review</p>
              <div class="flex items-center space-x-3 w-full justify-center">
                 <div class="text-white bg-white/40 p-2 rounded-full"><i class="fas fa-clock text-primary"></i></div>
                 <p class="text-3xl font-black text-black counter" data-target="5">0</p>
              </div>
            </div>
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex space-x-6 mb-10">
          <button class="flex-1 bg-primary text-white py-4 rounded-xl font-bold text-xl shadow-lg hover:bg-opacity-90 transition-transform transform hover:-translate-y-1">
            Upload Student Answer
          </button>
          <button class="flex-1 bg-primary text-white py-4 rounded-xl font-bold text-xl shadow-lg hover:bg-opacity-90 transition-transform transform hover:-translate-y-1">
            Start AI Evaluation
          </button>
        </div>

        <!-- Table and Robot Area -->
        <div class="flex flex-col md:flex-row space-x-0 md:space-x-8">
           <!-- Skeleton Table -->
           <div class="flex-[3] rounded-3xl border border-secondary p-6 flex flex-col bg-white">
              <div class="flex justify-between items-center text-center font-bold text-gray-800 text-sm mb-6 px-4">
                <div class="w-1/4 text-left">Student Name</div>
                <div class="w-1/4">Exam</div>
                <div class="w-1/4">Score</div>
                <div class="w-1/4 text-right">Status</div>
              </div>
              
              <div class="flex-1 flex flex-col justify-between px-4 pb-4 space-y-8">
                 <!-- Row 1 -->
                 <div class="flex justify-between items-center">
                    <div class="w-1/4"><div class="w-20 h-3 bg-secondary rounded-full"></div></div>
                    <div class="w-1/4 flex justify-center"><div class="w-12 h-3 bg-secondary rounded-full"></div></div>
                    <div class="w-1/4 flex justify-center"><div class="w-12 h-3 bg-secondary rounded-full"></div></div>
                    <div class="w-1/4 flex justify-end"><div class="w-12 h-3 bg-secondary rounded-full"></div></div>
                 </div>
                 <!-- Row 2 -->
                 <div class="flex justify-between items-center">
                    <div class="w-1/4"><div class="w-24 h-3 bg-secondary rounded-full"></div></div>
                    <div class="w-1/4 flex justify-center"><div class="w-12 h-3 bg-secondary rounded-full"></div></div>
                    <div class="w-1/4 flex justify-center"><div class="w-12 h-3 bg-secondary rounded-full"></div></div>
                    <div class="w-1/4 flex justify-end"><div class="w-12 h-3 bg-secondary rounded-full"></div></div>
                 </div>
                 <!-- Row 3 -->
                  <div class="flex justify-between items-center">
                    <div class="w-1/4"><div class="w-24 h-3 bg-secondary rounded-full"></div></div>
                    <div class="w-1/4 flex justify-center"><div class="w-12 h-3 bg-secondary rounded-full"></div></div>
                    <div class="w-1/4 flex justify-center"><div class="w-12 h-3 bg-secondary rounded-full"></div></div>
                    <div class="w-1/4 flex justify-end"><div class="w-12 h-3 bg-secondary rounded-full"></div></div>
                 </div>
                 <!-- Row 4 -->
                  <div class="flex justify-between items-center">
                    <div class="w-1/4"><div class="w-20 h-3 bg-secondary rounded-full"></div></div>
                    <div class="w-1/4 flex justify-center"><div class="w-12 h-3 bg-secondary rounded-full"></div></div>
                    <div class="w-1/4 flex justify-center"><div class="w-12 h-3 bg-secondary rounded-full"></div></div>
                    <div class="w-1/4 flex justify-end"><div class="w-12 h-3 bg-secondary rounded-full"></div></div>
                 </div>
              </div>
           </div>

           <!-- Robot Image -->
           <div class="flex-[1] flex items-center justify-center relative mt-8 md:mt-0">
              <img src="/01b4c6e29a452bcafafcfa385b42b46b660a1567.png" alt="AI Robot" class="w-full max-w-[220px] object-contain drop-shadow-2xl hover:scale-105 transition-transform duration-500">
           </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Footer -->
  <footer class="bg-lightbg border-t-2 border-secondary py-4 px-8 flex items-center justify-between mt-4 mx-4 mb-4 rounded-xl flex-shrink-0">
    <div class="flex items-center">
      <img src="/cb8b81f3f695ccaa88a2a199a16d5e49e712edf3(1)(1).png" alt="Evalify Logo" class="h-6 object-contain">
    </div>
    <div class="text-gray-400 text-xs font-semibold">
      Copyright © 2026 All rights reserved
    </div>
    <div class="flex space-x-3">
      <a href="#" class="text-primary hover:text-indigo-800 transition-colors"><i class="fab fa-facebook bg-white rounded-full p-2 shadow-sm"></i></a>
      <a href="#" class="text-white bg-gradient-to-tr from-red-500 via-red-400 to-yellow-500 rounded-full w-8 h-8 flex items-center justify-center shadow-sm hover:opacity-90 transition-opacity"><i class="fab fa-google text-xs"></i></a>
      <a href="#" class="text-green-500 hover:text-green-600 transition-colors"><i class="fab fa-whatsapp bg-white rounded-full p-2 shadow-sm text-lg rounded-full"></i></a>
    </div>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Dynamic User Name
      let userName = localStorage.getItem('userName') || 'Dr.mohamed';
      // Format it properly
      if (userName && userName.length > 0) {
        // Just use whatever is stored, default is Dr.mohamed matching the design
      }
      
      const displays = document.querySelectorAll('.user-name-display');
      Displays = Array.from(displays);
      Displays.forEach(el => el.textContent = userName);

      const displayTitle = document.querySelector('.user-name-display-title');
      if(displayTitle) displayTitle.textContent = userName;
      
      const avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(userName)}&background=6C4DFF&color=fff&bold=true`;
      document.querySelectorAll('.user-avatar').forEach(img => img.src = avatarUrl);

      // Animated Stats Cards (Count-Up)
      const counters = document.querySelectorAll('.counter');
      const speed = 200; // The lower the slower
      
      const observer = new IntersectionObserver((entries, observer) => {
         entries.forEach(entry => {
            if (entry.isIntersecting) {
               const counter = entry.target;
               const target = +counter.getAttribute('data-target');
               
               // Give each card a slightly different duration for a natural feel
               const durationMultiplier = Math.random() * 0.5 + 0.8; 
               const updateCount = () => {
                  const count = +counter.innerText;
                  const inc = target / (speed * durationMultiplier);

                  if (count < target) {
                     counter.innerText = Math.ceil(count + inc);
                     setTimeout(updateCount, 15);
                  } else {
                     counter.innerText = target;
                  }
               };
               updateCount();
               observer.unobserve(counter); // Only run once
            }
         });
      }, { threshold: 0.5 });
      
      counters.forEach(counter => observer.observe(counter));
    });
  </script>
</body>
</html>
