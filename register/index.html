<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Evalify</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/css/intlTelInput.css">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#4F46E5',
            secondary: '#E0E6FC',
          },
          fontFamily: {
            sans: ['Poppins', 'Inter', 'sans-serif'],
          },
          animation: {
            blob: "blob 7s infinite",
          },
          keyframes: {
            blob: {
              "0%": { transform: "translate(0px, 0px) scale(1)" },
              "33%": { transform: "translate(30px, -50px) scale(1.1)" },
              "66%": { transform: "translate(-20px, 20px) scale(0.9)" },
              "100%": { transform: "translate(0px, 0px) scale(1)" },
            },
          },
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer base {
          body {
            @apply font-sans text-gray-800 antialiased bg-gray-50;
          }
        }
        @layer components {
          .btn-primary {
            @apply bg-primary text-white px-6 py-2 rounded-full font-medium transition-all duration-300 hover:bg-opacity-90 hover:shadow-lg transform hover:-translate-y-0.5;
          }
          .btn-outline {
            @apply border-2 border-primary text-primary px-6 py-2 rounded-full font-medium transition-all duration-300 hover:bg-primary hover:text-white hover:shadow-lg transform hover:-translate-y-0.5;
          }
          .nav-link {
            @apply text-gray-700 font-medium hover:text-primary transition-colors duration-300;
          }
          .input-field {
            @apply w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all duration-300 bg-white;
          }
          .input-field-clean {
            @apply w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all duration-300 bg-white;
          }
          .iti {
            @apply w-full;
          }
        }
        .animation-delay-2000 {
          animation-delay: 2s;
        }
      </style>
</head>

<body class="bg-gray-50 flex flex-col min-h-screen">
  <!-- Navbar -->
  <nav class="w-full bg-white shadow-sm z-50 transition-all duration-300" id="navbar">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-20">
        <!-- Logo -->
        <div class="flex-shrink-0 flex items-center cursor-pointer" onclick="window.location.href='/'">
          <img src="/cb8b81f3f695ccaa88a2a199a16d5e49e712edf3(1)(1).png" alt="Evalify Logo"
            class="w-25 h-8 object-contain mr-2">
        </div>

        <!-- Menu Items (Desktop) -->
        <div class="hidden md:flex space-x-8">
          <a href="/" class="nav-link">Home</a>
          <a href="/#about" class="nav-link">About Us</a>
          <a href="/#contact" class="nav-link">Contact Us</a>
        </div>

        <!-- Buttons (Desktop) -->
        <div class="hidden md:flex space-x-4 items-center">
          <button class="btn-primary" onclick="window.location.href='/login/'">Log In</button>
        </div>

        <!-- Mobile menu button -->
        <div class="md:hidden flex items-center">
          <button id="mobile-menu-btn" class="text-gray-500 hover:text-primary focus:outline-none">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Mobile Menu Panel -->
    <div id="mobile-menu"
      class="hidden md:hidden bg-white border-t border-gray-100 px-4 pt-2 pb-6 space-y-4 shadow-lg absolute w-full z-40">
      <a href="/" class="block nav-link py-2">Home</a>
      <a href="/#about" class="block nav-link py-2">About Us</a>
      <a href="/#contact" class="block nav-link py-2">Contact Us</a>
      <div class="flex flex-col space-y-3 pt-4 border-t border-gray-100">
        <button class="btn-primary w-full text-center" onclick="window.location.href='/login/'">Log In</button>
      </div>
    </div>
  </nav>

  <!-- Register Section -->
  <main class="flex-grow flex items-center justify-center py-12 relative overflow-hidden">
    <!-- Background blobs -->
    <div class="absolute top-0 right-0 w-96 h-96 bg-purple-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 translate-x-1/3 -translate-y-1/3 animate-blob"></div>
    <div class="absolute bottom-0 left-0 w-96 h-96 bg-secondary rounded-full mix-blend-multiply filter blur-3xl opacity-30 -translate-x-1/3 translate-y-1/3 animate-blob animation-delay-2000"></div>

    <div class="max-w-6xl mx-auto px-4 w-full relative z-10">
      <div class="bg-white rounded-3xl shadow-xl overflow-hidden flex flex-col md:flex-row border border-gray-100">
        
        <!-- Left Side: Registration Form -->
        <div class="w-full md:w-1/2 p-8 md:p-12 lg:p-16 flex flex-col justify-center">
          <div class="max-w-md mx-auto w-full">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-900 mb-2">Create my account</h1>
            <p class="text-gray-500 mb-8 leading-relaxed">
              Your virtual exam grading assistant
            </p>

            <form id="register-form" class="space-y-5">
              <!-- Name Fields -->
              <div class="flex space-x-4">
                <div class="w-1/2">
                  <label for="firstName" class="sr-only">First name</label>
                  <input type="text" id="firstName" name="firstName" required
                    class="input-field-clean" placeholder="First name">
                </div>
                <div class="w-1/2">
                  <label for="lastName" class="sr-only">Last name</label>
                  <input type="text" id="lastName" name="lastName" required
                    class="input-field-clean" placeholder="Last name">
                </div>
              </div>

              <!-- Email Field -->
              <div class="relative">
                <label for="email" class="sr-only">Email address</label>
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                  <i class="fas fa-envelope text-gray-400"></i>
                </div>
                <input type="email" id="email" name="email" required
                  class="input-field" placeholder="Email address">
              </div>

              <!-- Phone & Gender Fields -->
              <div class="flex space-x-4">
                <div class="w-1/2">
                  <label for="phone" class="sr-only">Phone Number</label>
                  <input type="tel" id="phone" name="phone" required
                    class="input-field-clean" placeholder="Phone Number">
                </div>
                <div class="w-1/2">
                  <label for="gender" class="sr-only">Gender</label>
                  <select id="gender" name="gender" required class="input-field-clean text-gray-500">
                    <option value="" disabled selected>Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                  </select>
                </div>
              </div>

              <!-- Password Field -->
              <div class="relative">
                <label for="password" class="sr-only">Password</label>
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                  <i class="fas fa-lock text-gray-400"></i>
                </div>
                <input type="password" id="password" name="password" required
                  class="input-field pr-12" placeholder="Password">
                <button type="button" id="toggle-password" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-primary focus:outline-none transition-colors">
                  <i class="fas fa-eye" id="eye-icon"></i>
                </button>
              </div>

               <!-- Confirm Password Field -->
               <div class="relative">
                <label for="confirmPassword" class="sr-only">Confirm Password</label>
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                  <i class="fas fa-lock text-gray-400"></i>
                </div>
                <input type="password" id="confirmPassword" name="confirmPassword" required
                  class="input-field pr-12" placeholder="Confirm Password">
                <button type="button" id="toggle-confirm-password" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-primary focus:outline-none transition-colors">
                  <i class="fas fa-eye" id="confirm-eye-icon"></i>
                </button>
              </div>

              <!-- Register Button -->
              <button id="submit-btn" type="submit" class="w-full bg-primary text-white py-3 rounded-xl font-semibold shadow-lg hover:bg-opacity-90 transition-all duration-300 transform hover:-translate-y-0.5 hover:shadow-xl mt-6 disabled:opacity-75 disabled:cursor-not-allowed">
                Sign UP
              </button>

              <!-- Feedback Message -->
              <div id="feedback-message" class="hidden text-center text-sm font-medium p-3 rounded-lg mt-4 transition-all duration-300"></div>
            </form>

            <p class="text-center mt-8 text-gray-600">
              Already have an account? <a href="/login/" class="text-primary font-semibold hover:underline">Log In</a>
            </p>
          </div>
        </div>

        <!-- Right Side: 3D Illustration -->
        <div class="w-full md:w-1/2 bg-gradient-to-br from-purple-50 to-secondary p-8 flex items-center justify-center relative overflow-hidden hidden md:flex">
           <!-- Dynamic decorative rings -->
           <div class="absolute w-[120%] h-[120%] border-[40px] border-white/40 rounded-full animate-[spin_30s_linear_infinite]"></div>
           <div class="absolute inset-0 bg-primary/5 backdrop-blur-[2px]"></div>
           <img src="../01b4c6e29a452bcafafcfa385b42b46b660a1567.png" alt="3D AI Robot Illustration" class="relative z-10 w-full max-w-md object-contain drop-shadow-2xl hover:scale-105 transition-transform duration-700 ease-in-out">
        </div>

      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-50 py-8 border-t border-gray-200 mt-auto">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex flex-col md:flex-row justify-between items-center gap-6">
        <!-- Logo -->
        <div class="flex items-center cursor-pointer" onclick="window.location.href='/'">
          <img src="/cb8b81f3f695ccaa88a2a199a16d5e49e712edf3(1)(1).png" alt="Evalify Logo"
            class="w-25 h-8 object-contain mr-2 filter drop-shadow-sm">
        </div>

        <!-- Copyright -->
        <div class="text-gray-500 text-sm font-medium">
          Copyright &copy; 2026 All rights reserved
        </div>

        <!-- Socials -->
        <div class="flex space-x-4">
          <a href="#"
            class="w-10 h-10 rounded-full bg-white border border-gray-200 flex items-center justify-center text-gray-500 hover:bg-primary hover:text-white transition-all duration-300 hover:shadow-md transform hover:-translate-y-1">
            <i class="fab fa-facebook-f"></i>
          </a>
          <a href="#"
            class="w-10 h-10 rounded-full bg-white border border-gray-200 flex items-center justify-center text-gray-500 hover:bg-primary hover:text-white transition-all duration-300 hover:shadow-md transform hover:-translate-y-1">
            <i class="fab fa-google"></i>
          </a>
          <a href="#"
            class="w-10 h-10 rounded-full bg-white border border-gray-200 flex items-center justify-center text-gray-500 hover:bg-primary hover:text-white transition-all duration-300 hover:shadow-md transform hover:-translate-y-1">
            <i class="fab fa-whatsapp"></i>
          </a>
        </div>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/intlTelInput.min.js"></script>
  <script type="module">
    document.addEventListener('DOMContentLoaded', () => {
      // Initialize Country Code Picker
      const phoneInput = document.getElementById('phone');
      const iti = window.intlTelInput(phoneInput, {
        initialCountry: "eg",
        separateDialCode: true,
        utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/utils.js"
      });

      // Setup mobile menu
      const mobileMenuBtn = document.getElementById('mobile-menu-btn');
      const mobileMenu = document.getElementById('mobile-menu');
      if (mobileMenuBtn && mobileMenu) {
        mobileMenuBtn.addEventListener('click', () => {
          mobileMenu.classList.toggle('hidden');
        });
      }

      // Setup password toggles
      const setupToggle = (btnId, fieldId, iconId) => {
        const toggleBtn = document.getElementById(btnId);
        const field = document.getElementById(fieldId);
        const icon = document.getElementById(iconId);
        if(toggleBtn && field && icon) {
          toggleBtn.addEventListener('click', () => {
              const type = field.getAttribute('type') === 'password' ? 'text' : 'password';
              field.setAttribute('type', type);
              if (type === 'password') {
                  icon.classList.remove('fa-eye-slash');
                  icon.classList.add('fa-eye');
              } else {
                  icon.classList.remove('fa-eye');
                  icon.classList.add('fa-eye-slash');
              }
          });
        }
      }
      setupToggle('toggle-password', 'password', 'eye-icon');
      setupToggle('toggle-confirm-password', 'confirmPassword', 'confirm-eye-icon');

      // Registration form submission mock
      const registerForm = document.getElementById('register-form');
      const submitBtn = document.getElementById('submit-btn');
      const feedbackMessage = document.getElementById('feedback-message');

      if(registerForm) {
        registerForm.addEventListener('submit', async (e) => {
          e.preventDefault();

          // Capture values
          const firstName = document.getElementById('firstName').value.trim();
          const lastName = document.getElementById('lastName').value.trim();
          const email = document.getElementById('email').value.trim();
          const phone = iti.getNumber();
          const gender = document.getElementById('gender').value;
          const password = document.getElementById('password').value;
          const confirmPassword = document.getElementById('confirmPassword').value;

          // Helper function for showing error
          const showError = (msg) => {
            feedbackMessage.innerHTML = msg;
            feedbackMessage.className = 'text-center text-sm font-medium p-3 rounded-lg mt-4 transition-all duration-300 bg-red-100 text-red-700';
          };

          // Client-side Validation
          // if (password.length < 8) {
          //   return showError('Password must be at least 8 characters long.');
          // }
          // if (password !== confirmPassword) {
          //   return showError('Passwords do not match.');
          // }

          const payload = {
              firstName, lastName, email, phone, gender, password
          };

          // Set Loading State
          submitBtn.disabled = true;
          submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Creating Account...';
          feedbackMessage.classList.add('hidden');
          feedbackMessage.className = 'hidden text-center text-sm font-medium p-3 rounded-lg mt-4 transition-all duration-300'; // reset classes

          try {
            // Placeholder for real API call
            await mockRegister(payload);

            // Success feedback
            feedbackMessage.textContent = 'Account created successfully! Redirecting to login...';
            feedbackMessage.classList.remove('hidden');
            feedbackMessage.classList.add('bg-green-100', 'text-green-700');
            submitBtn.innerHTML = '<i class="fas fa-check mr-2"></i>Success';
            submitBtn.classList.replace('bg-primary', 'bg-green-500');
            
            // Redirect instantly
            setTimeout(() => {
              window.location.href = '/dashboard/';
            }, 100);

          } catch (error) {
            // Error feedback
            showError(error.message || 'Registration failed. Please try again.');
            
            // Reset button state
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'Sign UP';
          }
        });
      }

      // Mock register function simulating API call
      function mockRegister(data) {
        return new Promise((resolve) => {
          setTimeout(() => {
             resolve({ status: 'success', message: 'User registered.' });
          }, 300); // 0.3 seconds delay for UX
        });
      }
    });
  </script>
</body>
</html>
